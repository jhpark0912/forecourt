spring:
  application:
    name: forecourt-collector
  main:
    # 웹 서버 아님 — 1회 실행 후 종료하는 배치
    web-application-type: none
    banner-mode: "off"

# 국토부 실거래가 API. 키는 환경변수 MOLIT_SERVICE_KEY 에서 주입(로컬 .env / CI 시크릿).
# 미설정 시 빈 값으로 시작은 되며 CollectorService 가 "없음" 으로 경고한다.
molit:
  service-key: ${MOLIT_SERVICE_KEY:}
